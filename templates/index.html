<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 그림 변환</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e6ecfa 100%);
            min-height: 100vh;
            margin: 0;
            color: #222c36;
        }

        .container {
            max-width: 400px;
            margin: 40px auto 0 auto;
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 6px 36px rgba(60,90,130,0.08), 0 1.5px 3px rgba(60,90,130,0.09);
            padding: 35px 28px 36px 28px;
            text-align: center;
        }

        h2 {
            font-size: 1.45rem;
            margin-bottom: 16px;
            font-weight: 700;
            color: #3B5998;
            letter-spacing: -1px;
        }

        .style-options {
            margin: 28px 0 22px 0;
            display: flex;
            justify-content: space-between;
        }
        .style-option {
            flex: 1 1;
            margin: 0 4px;
            padding: 12px 0;
            font-size: 1em;
            border: none;
            border-radius: 16px;
            background: #eef2fa;
            color: #476194;
            cursor: pointer;
            box-shadow: 0 1px 3px rgba(60,90,130,0.05);
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }
        .style-option.active,
        .style-option:hover {
            background: linear-gradient(135deg, #4078f8 40%, #7094f8 100%);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(80,100,180,0.13);
        }

        .file-label {
            display: inline-block;
            background: #4078f8;
            color: #fff;
            padding: 11px 30px;
            font-size: 1em;
            border-radius: 16px;
            margin-top: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.17s;
            font-weight: 500;
        }
        .file-label:hover {
            background: #285bb5;
        }
        input[type="file"] {
            display: none;
        }

        .preview-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #originalPreview, #resultPreview {
            width: 90%;
            max-width: 350px;
            border-radius: 12px;
            margin: 12px auto 0 auto;
            box-shadow: 0 1px 6px rgba(80,125,160,0.08);
            background: #f8fafd;
            display: none;
        }

        #loadingIndicator {
            color: #4078f8;
            background: #f7f8fe;
            font-size: 1.08em;
            border-radius: 10px;
            padding: 16px 0 9px 0;
            margin-top: 20px;
            animation: blink 1.4s infinite linear;
        }
        @keyframes blink {
            0%, 100% { opacity: 1;}
            50% { opacity: 0.7;}
        }
      
        .button-group {
            margin: 28px 0 10px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #convertBtn, #resetBtn {
            background: linear-gradient(90deg, #4078f8 60%, #2ba9dd 100%);
            color: #fff;
            font-size: 1em;
            padding: 12px 22px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 1.5px 6px rgba(64,120,248,0.10);
            font-weight: 600;
            transition: background 0.18s;
        }
        #convertBtn:hover {
            background: linear-gradient(90deg, #285bb5 60%, #209dbb 100%);
        }
        #resetBtn {
            background: #b5c1d8;
            color: #485278;
        }
        #resetBtn:hover {
            background: #dbe4f1;
            color: #01395a;
        }
        #downloadSection {
            margin: 0 auto;
            margin-top: 9px;
            display: none;
        }
        #downloadBtn {
            display: inline-block;
            padding: 10px 28px;
            text-decoration: none;
            font-size: 1em;
            background: linear-gradient(90deg, #4078f8 60%, #2ba9dd 100%);
            color: #fff;
            border-radius: 18px;
            margin-top: 5px;
            box-shadow: 0 1px 5px rgba(59,98,255,0.09);
            transition: background 0.15s, box-shadow 0.15s;
            font-weight: bold;
        }
        #downloadBtn:hover {
            background: linear-gradient(90deg, #285bb5 60%, #209dbb 100%);
        }

        @media (max-width: 600px) {
            .container {
                max-width: 95vw;
                padding: 20px 5vw 27px 5vw;
            }
            #originalPreview, #resultPreview {
                max-width: 98vw;
                margin-top: 9px;
            }
            .style-options { flex-direction: column; gap:7px;}
            .style-option {margin: 0;}
            .button-group {flex-direction: column; gap:7px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>AI 그림 변환</h2>
        <form id="mainForm" onsubmit="return false;">
            <label for="fileInput" class="file-label">이미지 선택하기</label>
            <input type="file" id="fileInput" accept="image/png, image/jpeg">

            <div class="preview-wrapper">
                <img id="originalPreview" alt="원본 미리보기">
            </div>

            <!-- 스타일 선택 -->
            <div class="style-options">
                <button type="button" class="style-option active" data-style="enhance">기본 향상</button>
                <button type="button" class="style-option" data-style="watercolor">수채화</button>
                <button type="button" class="style-option" data-style="oil">유화</button>
                <button type="button" class="style-option" data-style="digital">디지털 아트</button>
            </div>

            <div class="button-group">
                <button type="button" id="convertBtn">AI 변환하기</button>
                <button type="button" id="resetBtn">초기화</button>
            </div>
            <div id="loadingIndicator" style="display:none;">AI가 이미지를 생성 중입니다.<br>잠시만 기다려 주세요...</div>
        </form>
        <div class="preview-wrapper">
            <img id="resultPreview" alt="변환 결과 미리보기">
        </div>
        <div id="downloadSection">
            <a id="downloadBtn" href="#" download="">결과 이미지 다운로드</a>
        </div>
    </div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const resetBtn = document.getElementById('resetBtn');
    const styleOptions = document.querySelectorAll('.style-option');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const downloadBtn = document.getElementById('downloadBtn');
    const downloadSection = document.getElementById('downloadSection');
    const fileLabel = document.querySelector('.file-label');

    let selectedStyle = 'enhance';

    // 스타일 선택
    styleOptions.forEach(option => {
        option.addEventListener('click', () => {
            document.querySelector('.style-option.active').classList.remove('active');
            option.classList.add('active');
            selectedStyle = option.dataset.style;
        });
    });

    // 파일 선택 라벨 클릭 시 input 클릭
    fileLabel.addEventListener('click', function() {
        fileInput.click();
    });

    // 파일 업로드 및 원본 미리보기
    fileInput.addEventListener('change', function() {
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                alert('JPG 또는 PNG 파일만 업로드 가능합니다.');
                fileInput.value = '';
                originalPreview.style.display = 'none';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('파일 크기는 5MB 이하여야 합니다.');
                fileInput.value = '';
                originalPreview.style.display = 'none';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                originalPreview.src = e.target.result;
                originalPreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        } else {
            originalPreview.src = '';
            originalPreview.style.display = 'none';
        }
        resultPreview.src = '';
        resultPreview.style.display = 'none';
        downloadSection.style.display = 'none';
    });

    // 변환 버튼 동작
    convertBtn.addEventListener('click', function() {
        if (fileInput.files.length === 0) {
            alert('이미지 파일을 먼저 선택해주세요.');
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('style', selectedStyle);
        loadingIndicator.style.display = 'block';
        resultPreview.src = '';
        resultPreview.style.display = 'none';
        downloadSection.style.display = 'none';

        fetch('/enhance', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            loadingIndicator.style.display = 'none';
            if (data.success) {
                resultPreview.src = data.result_url + '?v=' + Date.now();
                resultPreview.style.display = 'block';
                downloadBtn.setAttribute('href', data.result_url + '?v=' + Date.now());
                downloadBtn.setAttribute('download', 'enhanced_' + selectedStyle + '.png');
                downloadSection.style.display = 'block';
            } else {
                alert(data.message);
            }
        })
        .catch(error => {
            loadingIndicator.style.display = 'none';
            alert('오류가 발생했습니다. 다시 시도해 주세요.');
        });
    });

    // 초기화 버튼
    resetBtn.addEventListener('click', function() {
        fileInput.value = '';
        originalPreview.src = '';
        originalPreview.style.display = 'none';
        resultPreview.src = '';
        resultPreview.style.display = 'none';
        downloadSection.style.display = 'none';
        document.querySelector('.style-option.active').classList.remove('active');
        document.querySelector('.style-option[data-style="enhance"]').classList.add('active');
        selectedStyle = 'enhance';
    });
});
</script>
</body>
</html>
